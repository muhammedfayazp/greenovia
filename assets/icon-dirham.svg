<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="currentColor">
  <defs>
    <mask id="dm">
      <rect width="80" height="100" fill="white"/>
      <!-- Cut gaps where the horizontal bars pass through -->
      <rect x="-2" y="29" width="84" height="15" fill="black"/>
      <rect x="-2" y="57" width="84" height="15" fill="black"/>
    </mask>
  </defs>
  <!-- D shape, with horizontal gaps cut by mask -->
  <g mask="url(#dm)">
    <!-- Left vertical stroke -->
    <rect x="4" y="2" width="14" height="96" rx="2"/>
    <!-- Right curved part of D -->
    <path d="M18,2 C70,2 76,22 76,50 C76,78 70,98 18,98"
          fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="square"/>
    <!-- Bridge between vertical and curve -->
    <rect x="4" y="2" width="22" height="96"/>
  </g>
  <!-- Horizontal bars (overlay on top) -->
  <rect x="0" y="32" width="78" height="9" rx="4.5"/>
  <rect x="0" y="60" width="78" height="9" rx="4.5"/>
</svg>
